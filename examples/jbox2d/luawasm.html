<title>Bytecoder Lua Scripting Test</title><body><h1>Bytecoder Lua Demo</h1><p>See Lua4J compiled to WebAssembly in action!<div class=codingarea><h2>Lua Code</h2><textarea cols=10 id=luainput rows=10>function add(a,b)
    return a+b
end

return add(1,2)</textarea><h2>Response</h2><pre id=luaoutput>
Run Lua to see the output!
            </pre></div><style>.codingarea {
                display: flex;
                flex-direction: column;
                flex-grow: 1;
                padding-bottom: 2rem;
            }</style><button style="display: none" value="Run Lua!" id=runlua>Run Lua!</button><script src=bytecoder-luademowasm_wasmbindings.js></script><script>// dynamic linking

            var instantiated = function(result) {
                bytecoder.init(result.instance);

                bytecoder.exports.initMemory(0);
                console.log("Memory initialized");
                bytecoder.exports.bootstrap(0);
                console.log("Bootstrapped");
                bytecoder.exports.main(0);
                console.log("Ready for action!");

                document.getElementById("runlua").style.display = "block";
            };

            // Try to load the WASM file
            WebAssembly.instantiateStreaming(fetch('bytecoder-luademowasm.wasm'), bytecoder.imports)
                .then(instantiated)
                .catch(function(error) {
                    console.log("Using fallback method to load WebAssembly! Check if mime types for WebAssembly are configured correctly!");
                    var request = new XMLHttpRequest();
                    request.open('GET', 'bytecoder-luademowasm.wasm');
                    request.responseType = 'arraybuffer';
                    request.send();

                    request.onload = function() {
                        var bytes = request.response;
                        WebAssembly.instantiate(bytes, bytecoder.imports).then(instantiated);
                    };
                });</script><a href=https://github.com/mirkosertic/Bytecoder>Go to Bytecoder @ Github</a>
